<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Saloon — App de Beleza</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: #0A0710;
    color: #F5E6D3;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0 }
    to   { transform: translateY(0); opacity: 1 }
  }
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 30% 20%, #1F1626 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #1A1320 0%, transparent 50%),
      #0A0710;
  }
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 25% 35%, rgba(232,180,184,0.04), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(212,175,143,0.04), transparent 40%);
    pointer-events: none;
  }
  .brand-watermark {
    position: fixed; top: 28px; left: 36px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-style: italic; letter-spacing: 0.5px;
    color: rgba(245,230,211,0.5);
    z-index: 1;
  }
  .brand-watermark span {
    font-family: 'Inter', sans-serif; font-style: normal;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    margin-left: 10px; color: rgba(212,175,143,0.7);
  }
</style>
</head>
<body>
<div class="brand-watermark">Saloon <span>Beauty, sem esforço</span></div>
<div class="stage" id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="saloon-tokens.jsx"></script>
<script type="text/babel" src="saloon-icons.jsx"></script>
<script type="text/babel" src="saloon-data.jsx"></script>
<script type="text/babel" src="saloon-screens-1.jsx"></script>
<script type="text/babel" src="saloon-screens-2.jsx"></script>
<script type="text/babel" src="saloon-screens-3.jsx"></script>
<script type="text/babel" src="saloon-screens-4.jsx"></script>
<script type="text/babel" src="saloon-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#E8B4B8",
  "showYearEndBanner": true,
  "homeDensity": "comfortable",
  "displayFont": "Cormorant Garamond"
}/*EDITMODE-END*/;

function Root() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Apply tweak overrides to the root token map at runtime
  React.useEffect(() => {
    if (!window.TOKENS) return;
    window.TOKENS.rose = tweaks.accent;
  }, [tweaks.accent]);

  return (
    <>
      <SaloonApp tweaks={tweaks}/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Marca">
          <TweakColor label="Cor de acento" value={tweaks.accent}
            onChange={v => setTweak('accent', v)}/>
          <TweakSelect label="Fonte display" value={tweaks.displayFont}
            options={['Cormorant Garamond', 'EB Garamond', 'Georgia']}
            onChange={v => setTweak('displayFont', v)}/>
        </TweakSection>
        <TweakSection label="Conteúdo">
          <TweakToggle label="Banner Réveillon" value={tweaks.showYearEndBanner}
            onChange={v => setTweak('showYearEndBanner', v)}/>
          <TweakRadio label="Densidade home" value={tweaks.homeDensity}
            options={[{value:'comfortable',label:'Conforto'},{value:'compact',label:'Compacto'}]}
            onChange={v => setTweak('homeDensity', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('stage'));
root.render(<Root/>);
</script>
</body>
</html>
